name: mrbarril_pedidos
description: App de gestión y administración de pedidos multi-tienda (Mr Barril).
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.6

  # Backend
  supabase_flutter: ^2.5.6

  # Notificaciones push
  firebase_core: ^3.4.0
  firebase_messaging: ^15.1.0
  flutter_local_notifications: ^17.2.2

  # UI / utilidades
  fl_chart: ^0.68.0
  intl: ^0.20.2
  url_launcher: ^6.3.0
  share_plus: ^10.0.2
  flutter_dotenv: ^5.1.0
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/